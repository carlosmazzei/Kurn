name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-26-arm64

    env:
      XCODE_PROJECT: MeetSync.xcodeproj
      XCODE_SCHEME: MeetSync
      IOS_DESTINATION: platform=iOS Simulator,name=iPhone 17

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi

      - name: Lint
        run: swiftlint lint --config .swiftlint.yml --reporter github-actions-logging

      - name: Prepare simulator runtimes
        run: |
          sudo xcodebuild -runFirstLaunch

          if ! xcrun simctl list runtimes available | grep -q "iOS"; then
            xcodebuild -downloadPlatform iOS
          fi

          if ! xcrun simctl list runtimes available | grep -q "watchOS"; then
            xcodebuild -downloadPlatform watchOS
          fi

      - name: Build and test
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "$IOS_DESTINATION" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            clean test
