name: iOS CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: macos-26

    env:
      XCODE_PROJECT: Kurn.xcodeproj
      XCODE_SCHEME: Kurn
      IOS_DESTINATION: platform=iOS Simulator,name=iPhone 17

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi

      - name: Lint
        run: swiftlint lint --config .swiftlint.yml --reporter github-actions-logging

      - name: Prepare simulator runtimes
        run: |
          sudo xcodebuild -runFirstLaunch

          if ! xcrun simctl list runtimes available | grep -q "iOS"; then
            xcodebuild -downloadPlatform iOS
          fi

          if ! xcrun simctl list runtimes available | grep -q "watchOS"; then
            xcodebuild -downloadPlatform watchOS
          fi

      - name: Build and test
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "$IOS_DESTINATION" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            clean test

  release:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Publish GitHub release
        run: bundle exec fastlane github_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
